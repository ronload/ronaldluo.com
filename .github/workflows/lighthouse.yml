name: Lighthouse

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.deployment_status.environment_url || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.deployment_status.environment_url }}/en
            ${{ github.event.deployment_status.environment_url }}/zh-TW
            ${{ github.event.deployment_status.environment_url }}/en/contact
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
